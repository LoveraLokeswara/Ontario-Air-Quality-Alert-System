name: Test NHITS Pipeline

on:
  push:
    branches: [duplicate_main]
  workflow_dispatch:

jobs:
  run-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run NHITS model
        run: uv run python sweep_real_nhits.py

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render presentation
        run: quarto render results/presentation.qmd

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results/
