name: Run NHITS Model Test

on:
  push:
    branches: [duplicate_main]
  workflow_dispatch:

jobs:
  run-nhits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run NHITS model
        run: uv run python sweep_real_nhits.py
